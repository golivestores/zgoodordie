<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ZGOODORDIE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
    }

    /* Canvas — fixed, full-bleed WebGL output */
    #c {
      position: fixed;
      inset: 0;
      display: block;
      width: 100% !important;
      height: 100% !important;
      z-index: 0;
    }

    /* Hidden video elements used as GPU textures */
    #v1, #v2 {
      position: absolute;
      width: 1px; height: 1px;
      top: -9999px;
      pointer-events: none;
    }

    /* ── PHASE 1 UI ─────────────────────────────────── */
    #ui {
      position: fixed;
      inset: 0;
      z-index: 31;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding:
        max(env(safe-area-inset-top,  44px), 44px) 28px
        max(env(safe-area-inset-bottom, 40px), 40px);
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    body.phase2 #ui,
    body.phase3 #ui { opacity: 0; }

    .ui-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 9px;
      letter-spacing: 0.42em;
      color: rgba(0,255,180,0.70);
      text-shadow: 0 0 14px rgba(0,255,180,0.30);
    }

    .phase-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(0,255,180,0.35);
    }

    /* ── TAP ZONE ───────────────────────────────────── */
    #tap {
      position: fixed;
      inset: 0;
      z-index: 30;
      cursor: pointer;
    }

    body.phase2 #tap,
    body.phase3 #tap { pointer-events: none; }

    /* ── CRT SCANLINES ──────────────────────────────── */
    .crt-lines {
      position: fixed;
      inset: 0;
      z-index: 18;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.055) 3px,
        rgba(0,0,0,0.055) 4px
      );
      pointer-events: none;
    }

    /* ── HUD CORNERS ────────────────────────────────── */
    .hud-corner {
      position: fixed;
      z-index: 32;
      width: 22px;
      height: 22px;
      pointer-events: none;
      opacity: 0;
      animation: hud-fade 0.6s 0.4s ease forwards;
    }
    .hud-tl { top: 18px; left: 18px;
      border-top: 1px solid rgba(0,255,180,0.50);
      border-left: 1px solid rgba(0,255,180,0.50); }
    .hud-tr { top: 18px; right: 18px;
      border-top: 1px solid rgba(0,255,180,0.50);
      border-right: 1px solid rgba(0,255,180,0.50); }
    .hud-bl { bottom: 18px; left: 18px;
      border-bottom: 1px solid rgba(0,255,180,0.50);
      border-left: 1px solid rgba(0,255,180,0.50); }
    .hud-br { bottom: 18px; right: 18px;
      border-bottom: 1px solid rgba(0,255,180,0.50);
      border-right: 1px solid rgba(0,255,180,0.50); }

    @keyframes hud-fade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── TERMINAL BLOCK ─────────────────────────────── */
    .ui-center {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 0 32px;
    }

    .terminal-block {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: clamp(11px, 2.9vw, 14px);
      line-height: 1.9;
      color: rgba(210, 255, 240, 0.90);
      text-shadow: 0 0 18px rgba(0,255,180,0.28);
      white-space: pre;
      min-height: 4.5em;
    }

    .terminal-cursor {
      display: inline-block;
      color: rgba(0,255,180,0.95);
      text-shadow: 0 0 10px rgba(0,255,180,0.7);
      animation: cur-blink 0.9s step-end infinite;
    }

    @keyframes cur-blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    .fate-index {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(9px, 2.1vw, 11px);
      letter-spacing: 0.06em;
      color: rgba(0,255,180,0.45);
      margin-top: 12px;
    }

    /* ── HUD BUTTON ─────────────────────────────────── */
    .ui-bottom {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .hud-btn-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 9px;
      pointer-events: auto;
      cursor: pointer;
      opacity: 0;
      animation: hud-fade 0.7s 0.8s ease forwards;
    }

    .hud-btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(10px, 2.6vw, 13px);
      letter-spacing: 0.10em;
      color: rgba(210, 255, 240, 0.85);
      background: none;
      border: none;
      cursor: pointer;
      padding: 10px 0;
      position: relative;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    .hud-btn .br-l,
    .hud-btn .br-r {
      display: inline-block;
      color: rgba(0,255,180,0.75);
      transition: transform 0.28s ease;
    }

    .hud-btn-wrap:hover .br-l { transform: translateX(-6px); }
    .hud-btn-wrap:hover .br-r { transform: translateX(6px); }
    .hud-btn-wrap:hover .hud-btn { color: rgba(0,255,210,1); }

    .hud-btn::after {
      content: '';
      position: absolute;
      bottom: 6px;
      left: 0; right: 100%;
      height: 1px;
      background: rgba(0,255,180,0.55);
    }
    .hud-btn-wrap:hover .hud-btn::after {
      right: 0;
      transition: right 0.32s ease;
    }

    /* ── PROGRESS BAR ───────────────────────────────── */
    .progress-line {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(8px, 2vw, 10px);
      letter-spacing: 0.05em;
      color: rgba(0,255,180,0.38);
    }

    /* ── PHASE 3 ICON BAR ───────────────────────────── */
    #ui3 {
      position: fixed;
      bottom: max(env(safe-area-inset-bottom, 36px), 36px);
      left: 0; right: 0;
      z-index: 40;
      display: flex;
      justify-content: center;
      pointer-events: none;
      opacity: 0;
      transform: translateY(32px);
    }

    body.phase3 #ui3 {
      pointer-events: auto;
    }

    .icon-row {
      display: flex;
      gap: clamp(12px, 4vw, 22px);
      perspective: 500px;
      padding: 0 20px 24px;
    }

    .icon-card {
      position: relative;
      width: clamp(66px, 18vw, 82px);
      height: clamp(66px, 18vw, 82px);
      cursor: pointer;
      border-radius: 17px;
      transform-origin: 50% 100%;
      transform: rotateX(10deg) translateZ(0);
      opacity: 0;
      box-shadow:
        0 5px 0 1px rgba(8,8,10,0.95),
        0 8px 0 2px rgba(4,4,5,0.80),
        0 12px 28px rgba(0,0,0,0.65),
        0 0 0 1px rgba(0,255,180,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.07);
      transition: transform 0.22s ease, box-shadow 0.22s ease;
      -webkit-tap-highlight-color: transparent;
    }

    body.phase3 .icon-card:nth-child(1) { animation: card-rise 0.52s 0.35s cubic-bezier(.22,.61,.36,1) both; }
    body.phase3 .icon-card:nth-child(2) { animation: card-rise 0.52s 0.48s cubic-bezier(.22,.61,.36,1) both; }
    body.phase3 .icon-card:nth-child(3) { animation: card-rise 0.52s 0.61s cubic-bezier(.22,.61,.36,1) both; }
    body.phase3 .icon-card:nth-child(4) { animation: card-rise 0.52s 0.74s cubic-bezier(.22,.61,.36,1) both; }

    @keyframes card-rise {
      from { opacity: 0; transform: rotateX(10deg) translateY(22px); }
      to   { opacity: 1; transform: rotateX(10deg) translateY(0); }
    }

    .icon-card:hover {
      transform: rotateX(0deg) translateY(-6px) scale(1.06);
      box-shadow:
        0 14px 0 1px rgba(8,8,10,0.85),
        0 18px 36px rgba(0,0,0,0.55),
        0 0 0 1px rgba(0,255,180,0.40),
        0 0 22px rgba(0,255,180,0.14),
        inset 0 0 0 1px rgba(255,255,255,0.10);
    }

    /* Tap feedback uses filter (not transform) to avoid GSAP float conflict */
    .icon-card:active {
      filter: brightness(1.15);
      transition: filter 0.08s ease;
    }

    .icon-card img {
      width: 100%; height: 100%;
      border-radius: 17px;
      display: block;
      object-fit: cover;
      pointer-events: none;
    }

    .icon-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.12em;
      color: rgba(0,255,180,0.40);
      white-space: nowrap;
      pointer-events: none;
    }

    /* ── GLITCH ─────────────────────────────────────── */
    @keyframes glitch-shift {
      0%, 100% { transform: translate(0); filter: none; }
      20%       { transform: translate(-3px, 1px); filter: hue-rotate(80deg) saturate(2); }
      40%       { transform: translate(3px, -1px); filter: hue-rotate(-80deg) saturate(2); }
      60%       { transform: translate(-1px, 2px); filter: hue-rotate(40deg); }
      80%       { transform: translate(0); filter: none; }
    }

    body.glitch-active #ui {
      animation: glitch-shift 0.12s ease;
    }
    body.glitch-active .crt-lines {
      opacity: 2;
    }

    /* ── SPLASH (entry loading video) ───────────── */
    #splash {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 100;
      background: #000;
      object-fit: contain;
      pointer-events: none;
      transition: opacity 0.55s ease;
    }
    body.splash-done #splash { opacity: 0; }

    /* While splash is playing, hide all phase-1 UI */
    body.splash #ui,
    body.splash .hud-corner,
    body.splash .crt-lines {
      opacity: 0 !important;
      animation: none !important;
    }

    /* After splash, GSAP drives the fade-in — kill the original CSS
       hud-fade animations to avoid conflict / stagger holes */
    body.splash-done .hud-corner,
    body.splash-done .hud-btn-wrap {
      animation: none !important;
    }

    /* ── BACKGROUND LAYER ───────────────────────── */
    #bg-layer {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      opacity: 0;
      transition: opacity 0.55s ease;
      pointer-events: none;
    }

    #bg-layer.visible { opacity: 1; }

    /* ── CARD RAIN OVERLAY ───────────────────────── */
    #card-overlay {
      position: fixed;
      inset: 0;
      z-index: 60;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
      pointer-events: none;
      opacity: 0;
      background: rgba(0,0,0,0);
      transition: background 0.5s ease;
    }

    #card-overlay.active {
      pointer-events: auto;
      background: rgba(0,0,0,0.60);
    }

    #flip-card {
      width: min(70vw, 340px);
      aspect-ratio: 63 / 88;
      perspective: 1400px;
    }

    .flip-inner {
      width: 100%; height: 100%;
      transform-style: preserve-3d;
      transform: rotateY(0deg);
      transition: transform 0.95s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 20px;
    }

    #card-overlay.flipped .flip-inner {
      transform: rotateY(180deg);
    }

    .flip-back, .flip-front {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      overflow: hidden;
    }

    .flip-back {
      background:
        radial-gradient(ellipse at 30% 20%, rgba(0,255,180,0.07) 0%, transparent 55%),
        linear-gradient(145deg, #0a0f0d 0%, #0e1f18 50%, #080e0c 100%);
      border: 1px solid rgba(0,255,180,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow:
        0 0 0 1px rgba(0,255,180,0.10) inset,
        0 24px 60px rgba(0,0,0,0.8);
    }

    .card-back-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    .card-back-brand {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: clamp(12px, 3.5vw, 18px);
      letter-spacing: 0.5em;
      text-indent: 0.5em;
      color: rgba(0,255,180,0.65);
      text-shadow: 0 0 28px rgba(0,255,180,0.35);
    }

    .card-back-rule {
      width: 60%;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(0,255,180,0.3), transparent);
    }

    .card-back-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      color: rgba(0,255,180,0.28);
    }

    .flip-front {
      transform: rotateY(180deg);
      background: #0c0f0e;
      border: 1px solid rgba(0,255,180,0.18);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }

    .qr-frame {
      background: #fff;
      padding: 10px;
      border-radius: 10px;
      line-height: 0;
      box-shadow: 0 0 0 1px rgba(0,255,180,0.15), 0 8px 24px rgba(0,0,0,0.5);
    }

    .qr-frame img {
      width: 100%;
      max-width: 210px;
      display: block;
      border-radius: 2px;
    }

    .qr-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.18em;
      color: rgba(0,255,180,0.45);
      text-align: center;
    }

    #card-close {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.22em;
      color: rgba(0,255,180,0.42);
      background: none;
      border: 1px solid rgba(0,255,180,0.18);
      padding: 9px 22px;
      border-radius: 4px;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s, background 0.2s;
      -webkit-tap-highlight-color: transparent;
    }

    #card-close:hover {
      color: rgba(0,255,180,0.9);
      border-color: rgba(0,255,180,0.5);
      background: rgba(0,255,180,0.06);
    }

  </style>
</head>
<body class="splash">

  <!-- Entry splash (3.5s loading video) -->
  <video id="splash" autoplay muted playsinline preload="auto">
    <source src="loading.mp4" type="video/mp4">
  </video>

  <!-- WebGL canvas -->
  <canvas id="c"></canvas>

  <!-- Video sources (hidden, streamed as GPU textures) -->
  <video id="v1" autoplay muted loop playsinline preload="metadata">
    <source src="new%20video-1.mp4" type="video/mp4">
  </video>
  <video id="v2" muted playsinline preload="none"></video>

  <!-- CRT scanlines -->
  <div class="crt-lines"></div>

  <!-- HUD corner markers -->
  <div class="hud-corner hud-tl"></div>
  <div class="hud-corner hud-tr"></div>
  <div class="hud-corner hud-bl"></div>
  <div class="hud-corner hud-br"></div>

  <!-- Phase 1 overlay -->
  <div id="ui">
    <div class="ui-top">
      <span class="brand">ZGOODORDIE</span>
      <span class="phase-tag">v.0.3</span>
    </div>

    <div class="ui-bottom">
      <div class="hud-btn-wrap" id="enter-btn">
        <button class="hud-btn"><span class="br-l">[ </span>► PRESS TO ROLL THE DICE<span class="br-r"> ]</span></button>
        <div class="progress-line" id="progress-bar">LOADING FATE... ▓▓▓▓▓░░░░░ 53%</div>
      </div>
    </div>
  </div>

  <!-- Tap zone -->
  <div id="tap"></div>

  <!-- Phase 3 icon bar -->
  <div id="ui3">
    <div class="icon-row">
      <div class="icon-card" id="icon-btn-1">
        <img src="icon1.webp" alt="Arena">
        <span class="icon-label">ARENA</span>
      </div>
      <div class="icon-card">
        <img src="icon2.webp" alt="Reward">
        <span class="icon-label">REWARD</span>
      </div>
      <div class="icon-card">
        <img src="icon3.webp" alt="Fortune">
        <span class="icon-label">FORTUNE</span>
      </div>
      <div class="icon-card">
        <img src="icon4.webp" alt="Oracle">
        <span class="icon-label">ORACLE</span>
      </div>
    </div>
  </div>

  <!-- Phase 4: Card rain + QR reveal -->
  <div id="card-overlay">
    <div id="flip-card">
      <div class="flip-inner">
        <div class="flip-back">
          <div class="card-back-inner">
            <span class="card-back-brand">ZGOODORDIE</span>
            <div class="card-back-rule"></div>
            <span class="card-back-sub">ROLL THE DICE</span>
          </div>
        </div>
        <div class="flip-front">
          <div class="qr-frame">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=420x420&data=https%3A%2F%2Fdemo.golivestores.com%2Fzgoodordie%2F&margin=10&color=0a0a0a&bgcolor=ffffff" alt="QR Code" loading="lazy">
          </div>
          <p class="qr-label">SCAN TO REVEAL YOUR FATE</p>
        </div>
      </div>
    </div>
    <button id="card-close">[ ✕ CLOSE ]</button>
  </div>

  <!-- GSAP 3 -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
  import * as THREE from 'three';
  import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
  import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

  /* ═══════════════════════════════════════════════════
     ZGOODORDIE  —  WebGL Cinematic Camera System
  ═══════════════════════════════════════════════════ */

  const canvas = document.getElementById('c');
  const v1     = document.getElementById('v1');
  const v2     = document.getElementById('v2');
  const tapEl  = document.getElementById('tap');

  /* ── RENDERER ──────────────────────────────────── */
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: false,
    alpha: false,
    powerPreference: 'high-performance',
  });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000, 1);

  /* ── SCENE & CAMERA ────────────────────────────── */
  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(
    60,
    window.innerWidth / window.innerHeight,
    0.001, 100
  );
  camera.position.z = 5;

  /* ── LIGHTS (needed for GLB PBR materials) ─────── */
  const ambientLight = new THREE.AmbientLight(0xffffff, 1.4);
  scene.add(ambientLight);
  const keyLight = new THREE.DirectionalLight(0xfff5e8, 2.0);
  keyLight.position.set(3, 5, 6);
  scene.add(keyLight);
  const fillLight = new THREE.DirectionalLight(0xd0e8ff, 0.8);
  fillLight.position.set(-4, 2, 3);
  scene.add(fillLight);

  /* ── VIDEO TEXTURES ────────────────────────────── */
  const tex1 = new THREE.VideoTexture(v1);
  const tex2 = new THREE.VideoTexture(v2);
  [tex1, tex2].forEach(t => {
    t.minFilter = THREE.LinearFilter;
    t.magFilter = THREE.LinearFilter;
  });

  /* ── BG IMAGE TEXTURES ─────────────────────────── */
  // Known compressed dimensions (from Python export):
  // bg-1: 500×1080  bg-2: 499×1080  bg-3: 498×1080  bg-4: 498×1080
  const BG_ASPECTS = [500/1080, 499/1080, 498/1080, 498/1080];
  const texLoader   = new THREE.TextureLoader();
  const bgTextures  = ['bg-1.webp','bg-2.webp','bg-3.webp','bg-4.webp'].map((src, i) => {
    const t = texLoader.load(src, tex => {
      // Override with actual loaded pixel dimensions once available
      if (tex.image && tex.image.naturalWidth) {
        tex.userData.aspect = tex.image.naturalWidth / tex.image.naturalHeight;
      }
      tex.needsUpdate = true;
    });
    // Set BEFORE first render to prevent power-of-2 auto-resize in WebGL1
    t.minFilter        = THREE.LinearFilter;
    t.magFilter        = THREE.LinearFilter;
    t.generateMipmaps  = false;
    t.wrapS            = THREE.ClampToEdgeWrapping;
    t.wrapT            = THREE.ClampToEdgeWrapping;
    t.userData.aspect  = BG_ASPECTS[i]; // immediate fallback
    return t;
  });

  /* ── SHADER ────────────────────────────────────── */
  const VERT = /* glsl */`
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `;

  const FRAG = /* glsl */`
    precision mediump float;

    uniform sampler2D uTex1;
    uniform sampler2D uTex2;
    uniform float     uBlend;
    uniform float     uVignette;
    uniform float     uChroma;
    uniform float     uGrain;
    uniform float     uBrightness;
    uniform float     uTime;
    uniform float     uVideoAspect1;
    uniform float     uVideoAspect2;
    uniform float     uScreenAspect;

    varying vec2 vUv;

    /* ── Film-grain hash ── */
    float hash(vec2 p) {
      return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
    }

    /* ── Object-fit: cover UV mapping ── */
    vec2 coverUV(vec2 uv, float videoAspect) {
      vec2 st     = uv - 0.5;
      float ratio = uScreenAspect / videoAspect;
      if (ratio < 1.0) {
        st.x *= ratio;
      } else {
        st.y /= ratio;
      }
      return clamp(st + 0.5, 0.0, 1.0);
    }

    void main() {
      vec2 uv1 = coverUV(vUv, uVideoAspect1);
      vec2 uv2 = coverUV(vUv, uVideoAspect2);
      vec2 dir = (vUv - 0.5) * uChroma * 0.007;

      /* Chromatic aberration on tex1 */
      vec4 c1;
      c1.r = texture2D(uTex1, uv1 + dir).r;
      c1.g = texture2D(uTex1, uv1).g;
      c1.b = texture2D(uTex1, uv1 - dir).b;
      c1.a = 1.0;

      /* Subtle chroma on tex2 */
      vec4 c2;
      c2.r = texture2D(uTex2, uv2 + dir * 0.25).r;
      c2.g = texture2D(uTex2, uv2).g;
      c2.b = texture2D(uTex2, uv2 - dir * 0.25).b;
      c2.a = 1.0;

      vec4 color = mix(c1, c2, clamp(uBlend, 0.0, 1.0));

      /* Vignette */
      float dist = length((vUv - 0.5) * vec2(1.5, 1.0));
      float vig  = 1.0 - smoothstep(0.28, 1.05, dist);
      color.rgb *= mix(1.0, vig, uVignette);

      /* Film grain (24fps cadence) */
      float frame = floor(uTime * 24.0);
      float grain = hash(vUv + vec2(frame * 0.013, frame * 0.007)) * 2.0 - 1.0;
      color.rgb  += grain * uGrain;

      /* Brightness (fade on scroll) */
      color.rgb  *= uBrightness;

      gl_FragColor = color;
    }
  `;

  const uniforms = {
    uTex1:          { value: tex1 },
    uTex2:          { value: tex2 },
    uBlend:         { value: 0.0 },
    uVignette:      { value: 0.68 },
    uChroma:        { value: 0.0 },
    uGrain:         { value: 0.022 },
    uBrightness:    { value: 1.0 },
    uTime:          { value: 0.0 },
    uVideoAspect1:  { value: 720 / 1280 },
    uVideoAspect2:  { value: 720 / 1280 },
    uScreenAspect:  { value: window.innerWidth / window.innerHeight },
  };

  /* ── PLANE — fills frustum at z=0 ─────────────── */
  function frustumSize(camZ) {
    const fovRad = (camera.fov * Math.PI) / 180;
    const h = 2 * Math.tan(fovRad / 2) * camZ;
    return { w: h * camera.aspect * 1.25, h: h * 1.25 };
  }

  const fs  = frustumSize(camera.position.z);
  const geo = new THREE.PlaneGeometry(fs.w, fs.h);
  const mat = new THREE.ShaderMaterial({ uniforms, vertexShader: VERT, fragmentShader: FRAG });
  const mesh = new THREE.Mesh(geo, mat);
  scene.add(mesh);

  /* v2 loads lazily when enter() is called */

  /* ── VIDEO ASPECT RATIOS ───────────────────────── */
  v1.addEventListener('loadedmetadata', () => {
    if (v1.videoWidth) uniforms.uVideoAspect1.value = v1.videoWidth / v1.videoHeight;
  });
  v2.addEventListener('loadedmetadata', () => {
    if (v2.videoWidth) uniforms.uVideoAspect2.value = v2.videoWidth / v2.videoHeight;
  });

  /* ── RESIZE ────────────────────────────────────── */
  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    uniforms.uScreenAspect.value = w / h;
  });

  /* ══════════════════════════════════════════════
     PHASE MANAGEMENT
  ══════════════════════════════════════════════ */
  let phase = 1;

  /* ── ENTER (Phase 1 → 2 → 3) ──────────────────── */
  function enter() {
    if (phase !== 1) return;
    phase = 2;
    document.body.classList.add('phase2');

    // Hide bottom HUD (button + progress) — splash GSAP set inline opacity:1,
    // so the CSS body.phase2 rule alone won't override it
    gsap.to(['#ui', '.hud-btn-wrap'], { opacity: 0, duration: 0.35, ease: 'power2.in' });

    if (!v2.src) {
      v2.src = 'new%20video-2.mp4';
      v2.load();
    }
    v2.currentTime = 0;
    v2.loop = true;
    v2.play().catch(() => {});

    const tl = gsap.timeline({ onComplete: onEnterComplete });

    /* A: Drift to over-shoulder position — step aside, lean in */
    tl.to(camera.position, {
      x: -0.42, y: 0.10, z: 3.6,
      duration: 0.90, ease: 'power2.in',
    }, 0);
    tl.to(camera.rotation, {
      y: -0.10,
      duration: 0.90, ease: 'power2.in',
    }, 0);

    /* B: Sweep past the shoulder — the crossing moment */
    tl.to(camera.position, {
      x: 0.20, y: -0.05, z: 1.0,
      duration: 0.54, ease: 'power4.in',
    }, 0.86);
    tl.to(camera.rotation, {
      y: 0.04,
      duration: 0.50, ease: 'power3.in',
    }, 0.86);

    /* Chroma + vignette spike during sweep */
    tl.to(uniforms.uChroma, {
      value: 5, duration: 0.44, ease: 'power2.in',
    }, 0.82);
    tl.to(uniforms.uVignette, {
      value: 1.0, duration: 0.38, ease: 'power2.in',
    }, 0.88);

    /* Cross-dissolve v1 → v2 at peak */
    tl.to(uniforms.uBlend, {
      value: 1.0, duration: 0.28, ease: 'none',
    }, 1.24);

    /* C: Pull back — now on the other side */
    tl.to(camera.position, {
      x: 0, y: 0, z: 4.2,
      duration: 1.00, ease: 'power3.out',
    }, 1.30);
    tl.to(camera.rotation, {
      y: 0, duration: 0.85, ease: 'power2.out',
    }, 1.30);
    tl.to(uniforms.uChroma, {
      value: 0, duration: 0.72, ease: 'power2.out',
    }, 1.26);
    tl.to(uniforms.uVignette, {
      value: 0.52, duration: 0.80, ease: 'power2.out',
    }, 1.36);
  }

  /* ── BACK (Phase 3 → Phase 1) — upward dolly retreat ─── */
  function back() {
    if (phase !== 3 || cardRainActive) return;
    phase = 2; // transitional
    document.body.classList.remove('phase3');
    document.body.classList.add('phase2');

    stopCardFloat();

    // Hide icon bar + restore Phase 1 HUD opacity (was 0 from enter())
    gsap.to('#ui3', { opacity: 0, y: 28, duration: 0.40, ease: 'power2.in' });

    const tl = gsap.timeline({ onComplete: onBackComplete });

    /* Camera arcs UP + BACK — matches the "swipe up" gesture metaphor */
    tl.to(camera.position, { y: 0.55, duration: 0.65, ease: 'power2.in' }, 0);
    tl.to(camera.position, { z: 6.4,  duration: 0.95, ease: 'power2.inOut' }, 0);
    tl.to(camera.rotation, { x: -0.10, duration: 0.65, ease: 'power2.in' }, 0);

    /* Cross-dissolve v2 → v1 */
    tl.to(uniforms.uBlend, { value: 0.0, duration: 0.45, ease: 'none' }, 0.20);

    /* Brief chroma + vignette spike for transition energy */
    tl.to(uniforms.uChroma,   { value: 4.5,  duration: 0.35, ease: 'power2.in' }, 0.10);
    tl.to(uniforms.uVignette, { value: 0.92, duration: 0.45, ease: 'power2.in' }, 0.10);

    /* Settle to Phase 1 baseline (0, 0, 5) */
    tl.to(camera.position, { y: 0, z: 5,    duration: 0.55, ease: 'power2.out' }, 0.85);
    tl.to(camera.rotation, { x: 0,          duration: 0.50, ease: 'power2.out' }, 0.85);
    tl.to(uniforms.uChroma,   { value: 0,    duration: 0.55, ease: 'power2.out' }, 0.85);
    tl.to(uniforms.uVignette, { value: 0.68, duration: 0.55, ease: 'power2.out' }, 0.85);

    /* Phase 1 HUD reveals during settle */
    tl.to(['#ui', '.hud-btn-wrap'], { opacity: 1, duration: 0.45, ease: 'power2.out' }, 1.00);
  }

  function onBackComplete() {
    phase = 1;
    document.body.classList.remove('phase2');
    if (!v2.paused) v2.pause(); // free decode pipeline
  }

  /* ── SWIPE-UP gesture (Phase 3 → Phase 1) ────────────── */
  let _sy = 0, _st = 0, _swipeArmed = false;
  document.addEventListener('touchstart', (e) => {
    if (phase !== 3 || cardRainActive) { _swipeArmed = false; return; }
    _sy = e.touches[0].clientY;
    _st = Date.now();
    _swipeArmed = true;
  }, { passive: true, capture: true });

  document.addEventListener('touchend', (e) => {
    if (!_swipeArmed) return;
    _swipeArmed = false;
    const dy = e.changedTouches[0].clientY - _sy;
    const dt = Date.now() - _st;
    if (dy > 80 && dt < 600) {
      e.stopImmediatePropagation(); // prevent icon-tap from also firing
      back();
    }
  }, { capture: true });

  function onEnterComplete() {
    phase = 3;
    document.body.classList.remove('phase2');
    document.body.classList.add('phase3');
    gsap.to('#ui3', { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out', delay: 0.2 });
    // Start floating after card-rise entry animation finishes (~1.4s)
    setTimeout(startCardFloat, 1400);
    log('phase3 ✓ — tap ARENA icon');
    loadGLB(); // background-load GLB now so it's ready when user taps icon1
  }

  /* ── ICON CARD FLOAT (Phase 3) ─────────────────
     Each card: independent sine-wave Y float +
     synchronized shadow expansion (depth illusion) */
  function startCardFloat() {
    document.querySelectorAll('.icon-card').forEach((card, i) => {
      // CSS `animation: card-rise ... both` permanently overrides inline
      // transform via fill-mode. Kill it once card-rise has played, and
      // restore opacity:1 (which the killed animation was holding).
      card.style.animation = 'none';
      card.style.opacity   = '1';
      // Anchor baseline transform — GSAP inline now owns transform
      gsap.set(card, { rotationX: 10, y: 0 });

      // Y float — large amplitude for mobile visibility
      gsap.to(card, {
        y: -14,
        duration: 2.2,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: i * 0.55,
      });

      // Shadow expands & softens as card lifts (fakes light source)
      gsap.to(card, {
        boxShadow: '0 3px 0 1px rgba(8,8,10,0.80), 0 5px 0 2px rgba(4,4,5,0.65), 0 30px 44px rgba(0,0,0,0.48), 0 0 0 1px rgba(0,255,180,0.22), 0 0 22px rgba(0,255,180,0.10), inset 0 0 0 1px rgba(255,255,255,0.09)',
        duration: 2.2,
        repeat: -1,
        yoyo: true,
        ease: 'sine.inOut',
        delay: i * 0.55,
      });
    });
  }

  function stopCardFloat() {
    gsap.killTweensOf('.icon-card');
  }

  /* ── TAP / CLICK ───────────────────────────────── */
  tapEl.addEventListener('click', enter);
  tapEl.addEventListener('touchend', (e) => {
    e.preventDefault();
    enter();
  }, { passive: false });

  /* ── RENDER LOOP ───────────────────────────────── */
  const clock = new THREE.Clock();

  (function animate() {
    requestAnimationFrame(animate);

    const t = clock.getElapsedTime();
    uniforms.uTime.value = t;

    /* Phase 1: slow camera "breathing" */
    if (phase === 1) {
      camera.position.z = 5 + Math.sin(t * 0.38) * 0.055;
      camera.rotation.z = Math.sin(t * 0.22) * 0.0025;
    }

    /* Force texture upload each frame while video is live */
    if (v1.readyState >= 2) tex1.needsUpdate = true;
    if (v2.readyState >= 2) tex2.needsUpdate = true;

    renderer.render(scene, camera);
  })();

  /* ── PREVENT ALL OVERSCROLL ────────────────────── */
  document.addEventListener('touchmove', (e) => {
    e.preventDefault();
  }, { passive: false });

  /* ── ENSURE V1 PLAYS (autoplay attribute is unreliable for off-screen elements) ── */
  function startV1() {
    if (v1.paused) {
      v1.play().catch(err => console.warn('[v1 play failed]', err));
    }
  }
  if (v1.readyState >= 1) {
    startV1();
  } else {
    v1.addEventListener('loadedmetadata', startV1, { once: true });
    v1.addEventListener('canplay', startV1, { once: true });
  }

  /* ══════════════════════════════════════════════
     SPLASH DISMISSAL  —  glitch-bridge transition (A+B)
     A: time-overlap splash fade with HUD reveal
     B: WebGL chroma/grain spike under splash as visual bridge
  ══════════════════════════════════════════════ */
  (function setupSplash() {
    const splash = document.getElementById('splash');
    if (!splash) return;
    let dismissed = false;

    const dismiss = () => {
      if (dismissed) return;
      dismissed = true;

      // expose uniforms for debugging in DevTools console
      window._u = uniforms;
      console.log('[splash] dismiss start, uniforms exposed as window._u');
      // expose a re-trigger for the disturbance only (no splash)
      window._testDisturbance = (peak = 0.5) => {
        const tl2 = gsap.timeline();
        tl2.to(uniforms.uChroma,     { value: 7.5,  duration: 0.22, ease: 'power3.in' }, 0);
        tl2.to(uniforms.uGrain,      { value: 0.18, duration: 0.22, ease: 'power3.in' }, 0);
        tl2.to(uniforms.uBrightness, { value: 0.40, duration: 0.22, ease: 'power3.in' }, 0);
        tl2.to(uniforms.uVignette,   { value: 1.0,  duration: 0.22, ease: 'power3.in' }, 0);
        tl2.to(uniforms.uChroma,     { value: 0,    duration: 0.55, ease: 'power2.out' }, 0.22 + peak);
        tl2.to(uniforms.uBrightness, { value: 1.0,  duration: 0.60, ease: 'power2.out' }, 0.22 + peak);
        tl2.to(uniforms.uVignette,   { value: 0.68, duration: 0.65, ease: 'power2.out' }, 0.22 + peak);
        tl2.to(uniforms.uGrain,      { value: 0.022,duration: 0.85, ease: 'power1.out' }, 0.22 + peak);
        return 'disturbance fired with hold=' + peak + 's';
      };
      console.log('[splash] call _testDisturbance(holdSeconds) anytime to re-trigger the spike');

      const tl = gsap.timeline({
        onStart:    () => console.log('[splash] timeline START'),
        onComplete: () => { console.log('[splash] timeline DONE'); splash.remove(); },
      });

      /* B-1: disturbance ramps up first (0.05 → 0.35s) — splash still on top
              the disturbance is hidden behind splash but ready to mask the cut */
      tl.to(uniforms.uChroma,     { value: 12,   duration: 0.30, ease: 'power2.in' }, 0.05);
      tl.to(uniforms.uGrain,      { value: 0.22, duration: 0.30, ease: 'power2.in' }, 0.05);
      tl.to(uniforms.uBrightness, { value: 0.30, duration: 0.30, ease: 'power2.in' }, 0.05);
      tl.to(uniforms.uVignette,   { value: 1.0,  duration: 0.30, ease: 'power2.in' }, 0.05);

      /* A-1: at peak disturbance, splash is HARD-CUT off (no fade)
              — the heavy chroma + dark + grain masks the abrupt change */
      tl.call(() => {
        splash.style.opacity = '0';
        document.body.classList.remove('splash');
        document.body.classList.add('splash-done');
        console.log('[splash] hard-cut at peak disturbance');
      }, [], 0.35);

      /* B-2: HOLD peak for 0.30s — eye registers the disturbed scene */
      tl.to(uniforms.uChroma,     { value: 12,   duration: 0.30 }, 0.35);
      tl.to(uniforms.uGrain,      { value: 0.22, duration: 0.30 }, 0.35);
      tl.to(uniforms.uBrightness, { value: 0.30, duration: 0.30 }, 0.35);

      /* B-3: signal recovery (0.65 → 1.30s) */
      tl.to(uniforms.uChroma,     { value: 0,     duration: 0.60, ease: 'power2.out' }, 0.65);
      tl.to(uniforms.uBrightness, { value: 1.0,   duration: 0.65, ease: 'power2.out' }, 0.65);
      tl.to(uniforms.uVignette,   { value: 0.68,  duration: 0.65, ease: 'power2.out' }, 0.65);
      tl.to(uniforms.uGrain,      { value: 0.022, duration: 0.85, ease: 'power1.out' }, 0.70);

      /* A-2: HUD reveals during recovery (0.80 → 1.35s) */
      tl.fromTo(['#ui', '.hud-corner', '.crt-lines', '.hud-btn-wrap'],
        { opacity: 0 },
        { opacity: 1, duration: 0.55, ease: 'power2.out', stagger: 0.05 },
        0.80
      );
    };

    splash.addEventListener('ended', dismiss);
    // Fallback: if `ended` never fires (some mobile browsers, autoplay denial)
    setTimeout(dismiss, 4500);
    // Best-effort autoplay (Safari sometimes ignores attribute)
    splash.play().catch(() => dismiss());
  })();

  /* ══════════════════════════════════════════════
     CYBER FORTUNE MACHINE UI
  ══════════════════════════════════════════════ */
  const progEl    = document.getElementById('progress-bar');
  const enterWrap = document.getElementById('enter-btn');

  /* Progress bar oscillator — drifts but never reaches 100% */
  const FILLED = '▓', EMPTY = '░', TOTAL = 10;
  let pct = 53, pDir = 1;
  setInterval(() => {
    pct += pDir * (Math.random() * 1.8 + 0.4);
    if (pct >= 88) pDir = -1;
    if (pct <= 46) pDir =  1;
    const n = Math.round(pct / 100 * TOTAL);
    const bar = FILLED.repeat(n) + EMPTY.repeat(TOTAL - n);
    progEl.textContent = `LOADING FATE... ${bar} ${Math.round(pct)}%`;
  }, 650);

  /* Random glitch bursts */
  function scheduleGlitch() {
    setTimeout(() => {
      document.body.classList.add('glitch-active');
      setTimeout(() => {
        document.body.classList.remove('glitch-active');
        scheduleGlitch();
      }, 120);
    }, 5000 + Math.random() * 9000);
  }
  scheduleGlitch();

  const log = (...a) => console.log(...a);

  /* ── WIRE ENTER BUTTON ────────────────────────── */
  enterWrap.addEventListener('click', (e) => { e.stopPropagation(); enter(); });
  enterWrap.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); enter(); }, { passive: false });

  /* ══════════════════════════════════════════════
     CARD RAIN  —  GLB load + animation
  ══════════════════════════════════════════════ */
  let cardProto = null;
  let cardRainActive = false;
  let glbLoading = false;
  let glbPendingTrigger = false;

  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.158.0/examples/jsm/libs/draco/');
  const gltfLoader = new GLTFLoader();
  gltfLoader.setDRACOLoader(dracoLoader);

  function loadGLB() {
    if (glbLoading || cardProto) return;
    glbLoading = true;
    log('GLB: loading...');
    gltfLoader.load('card%203d.opt.glb', (gltf) => {
      cardProto = gltf.scene;

      const box0 = new THREE.Box3().setFromObject(cardProto);
      const center = box0.getCenter(new THREE.Vector3());
      cardProto.position.sub(center);
      cardProto.updateMatrixWorld(true);

      cardProto.rotation.y = -Math.PI / 2;
      cardProto.updateMatrixWorld(true);

      const box1 = new THREE.Box3().setFromObject(cardProto);
      cardProto.userData.faceSize = box1.getSize(new THREE.Vector3());
      const fs2 = cardProto.userData.faceSize;
      log(`GLB: ready ✓ face=${fs2.x.toFixed(3)}x${fs2.y.toFixed(3)}`);

      if (glbPendingTrigger) { glbPendingTrigger = false; triggerCardRain(); }
    }, undefined, (err) => { log('GLB ERROR: ' + err.message); console.error('[GLB]', err); });
  }

  function triggerCardRain() {
    log('icon1 tapped');
    if (cardRainActive) { log('already active'); return; }
    if (!cardProto) {
      glbPendingTrigger = true;
      loadGLB();
      log('GLB not ready — loading now, will trigger when done');
      return;
    }
    cardRainActive = true;

    // Hide icon bar + stop float
    stopCardFloat();
    gsap.to('#ui3', { opacity: 0, y: 16, duration: 0.3 });
    document.getElementById('ui3').style.pointerEvents = 'none';

    /* ── Frustum at card world-z ── */
    const cardZ = 1.5;
    const dist  = camera.position.z - cardZ;   // ~2.7
    const fovR  = (camera.fov * Math.PI) / 180;
    const fH    = 2 * Math.tan(fovR / 2) * dist;
    const fW    = fH * camera.aspect;

    /* ── Hero card target scale: 70% screen width ──
       After proto rotation, faceSize.x = face width (~0.098)  */
    const fs     = cardProto.userData.faceSize;
    const heroS  = (fW * 0.72) / Math.max(fs.x, 0.001);
    const startS = heroS * 0.38;
    log(`fW=${fW.toFixed(2)} heroS=${heroS.toFixed(1)} startS=${startS.toFixed(1)}`);

    const NUM = 7, HERO = 3;
    const cards = [];

    for (let i = 0; i < NUM; i++) {
      const c = cardProto.clone(true);
      c.scale.setScalar(startS);
      c.position.set(
        (i - HERO) * fW * 0.26 + (Math.random() - 0.5) * 0.35,
        fH * 0.55 + Math.random() * fH * 0.20,
        cardZ + (Math.random() - 0.5) * 0.55
      );
      // Start with card face roughly visible (slight tilt from face-forward)
      c.rotation.set(
        (Math.random() - 0.5) * Math.PI * 0.6,  // small tilt
        -Math.PI / 2 + (Math.random() - 0.5) * Math.PI * 0.8,
        (Math.random() - 0.5) * 0.6
      );
      scene.add(c);
      cards.push(c);
    }

    const tl = gsap.timeline();

    /* Phase 1 — all cards fall & tumble (0 – ~2.8s, 2× slower) */
    cards.forEach((c, i) => {
      const t0  = i * 0.09;
      const endY = (i === HERO) ? 0.05 : (Math.random() - 0.55) * fH * 0.55;
      tl.to(c.position, { y: endY, duration: 2.3, ease: 'power1.in' }, t0);
      tl.to(c.rotation, {
        x: `+=${(2 + Math.random() * 3) * Math.PI}`,
        y: `+=${(3 + Math.random() * 2) * Math.PI}`,
        z: `+=${(Math.random() - 0.5) * Math.PI * 2}`,
        duration: 2.8 + Math.random() * 0.5,
        ease: 'power1.inOut',
      }, t0);
    });

    /* Phase 2 — non-hero scatter off screen (2.4s+) */
    cards.forEach((c, i) => {
      if (i === HERO) return;
      const dir = (i < HERO) ? -1 : 1;
      const t1  = 2.44 + Math.abs(i - HERO) * 0.13;
      tl.to(c.position, {
        x: dir * fW * 2.2,
        y: -(fH + 1.2),
        duration: 1.36, ease: 'power3.in',
        onComplete: () => scene.remove(c),
      }, t1);
    });

    const hero = cards[HERO];

    /* Phase 3 — hero centers, grows, keeps spinning (2.8 – 5.5s) */
    tl.to(hero.position, { x: 0, y: 0, z: cardZ, duration: 2.1, ease: 'power2.out' }, 2.8);
    tl.to(hero.scale,    { x: heroS, y: heroS, z: heroS, duration: 2.1, ease: 'back.out(1.3)' }, 2.8);
    // Spin: 4 full Y rotations ending face-forward
    tl.to(hero.rotation, {
      x: 0,
      y: -Math.PI / 2 + Math.PI * 8,
      z: 0,
      duration: 2.7, ease: 'power3.inOut',
    }, 2.8);

    /* Snap face-forward (5.5s) */
    tl.to(hero.rotation, {
      x: 0, y: -Math.PI / 2, z: 0,
      duration: 0.4, ease: 'power2.out',
    }, 5.3);

    /* Phase 4 — remove 3D cards, show CSS flip card (5.7s) */
    tl.call(() => {
      log('CSS card reveal');
      cards.forEach(c => scene.remove(c));

      const overlay = document.getElementById('card-overlay');
      overlay.style.opacity = '1';
      overlay.classList.add('active');
      requestAnimationFrame(() => {
        setTimeout(() => overlay.classList.add('flipped'), 400);
      });
    }, [], 5.7);
  }

  /* Close button */
  document.getElementById('card-close').addEventListener('click', () => {
    const overlay = document.getElementById('card-overlay');
    overlay.classList.remove('flipped');
    setTimeout(() => {
      overlay.classList.remove('active');
      gsap.to(overlay, { opacity: 0, duration: 0.4, onComplete: () => {
        cardRainActive = false;
        gsap.to('#ui3', { opacity: 1, y: 0, duration: 0.5 });
        document.getElementById('ui3').style.pointerEvents = 'auto';
        startCardFloat(); // resume float when icon bar returns
      }});
    }, 500);
  });

  /* ── BACKGROUND SWITCHER — A+C: Glitch Cut + Signal Loss ── */
  let activeBg    = -1;
  let bgSwitching = false;

  function switchBg(idx) {
    if (bgSwitching) return;
    bgSwitching = true;

    const toggleOff = (activeBg === idx);
    activeBg = toggleOff ? -1 : idx;

    const tl = gsap.timeline({ onComplete: () => { bgSwitching = false; } });

    /* ── A: Glitch hit ── */
    tl.to(uniforms.uChroma,     { value: 9,    duration: 0.07, ease: 'power4.in'  }, 0);
    tl.to(uniforms.uGrain,      { value: 0.18, duration: 0.07, ease: 'power3.in'  }, 0);
    tl.to(uniforms.uBrightness, { value: 0.3,  duration: 0.055,ease: 'power4.in'  }, 0.015);
    tl.to(uniforms.uVignette,   { value: 0.98, duration: 0.07, ease: 'power2.in'  }, 0);

    /* ── Texture swap at distortion peak ── */
    tl.call(() => {
      if (toggleOff) {
        uniforms.uTex2.value         = tex2;
        uniforms.uVideoAspect2.value = v2.videoWidth
          ? v2.videoWidth / v2.videoHeight : 720 / 1280;
      } else {
        const t = bgTextures[idx];
        uniforms.uTex2.value         = t;
        uniforms.uVideoAspect2.value = t.userData.aspect || (500 / 1080);
      }
    }, [], 0.08);

    /* ── C: Signal rebuild ── */
    tl.to(uniforms.uChroma,     { value: 0,     duration: 0.18, ease: 'power2.out' }, 0.08);
    tl.to(uniforms.uBrightness, { value: 1.0,   duration: 0.22, ease: 'power2.out' }, 0.08);
    tl.to(uniforms.uVignette,   { value: 0.52,  duration: 0.38, ease: 'power2.out' }, 0.08);
    tl.to(uniforms.uGrain,      { value: 0.022, duration: 0.60, ease: 'power1.out' }, 0.10);
  }

  /* Wire all 4 icon buttons */
  document.querySelectorAll('.icon-card').forEach((btn, idx) => {
    const handler = (e) => {
      e.preventDefault();
      e.stopPropagation();
      switchBg(idx);
      if (idx === 0) triggerCardRain();
    };
    btn.addEventListener('click',    handler);
    btn.addEventListener('touchend', handler, { passive: false });
  });

  </script>
</body>
</html>
